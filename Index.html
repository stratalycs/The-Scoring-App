<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Scorer Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans select-none">

    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-10 shadow-xl">
        <div class="max-w-xl mx-auto flex justify-between items-end">
            <div>
                <p id="match-title" class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-1">Live Match</p>
                <h1 id="score-main" class="text-5xl font-black tabular-nums">0<span class="text-slate-600 text-3xl font-light">/0</span></h1>
            </div>
            <div class="text-right">
                <p id="overs-main" class="text-3xl font-mono">0.0</p>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">Overs Bowled</p>
            </div>
        </div>
        
        <div id="ticker" class="mt-4 flex gap-2 overflow-x-auto no-scrollbar py-1">
            </div>
    </header>

    <main class="flex-1 max-w-xl w-full mx-auto p-4">
        <div class="bg-slate-900 rounded-xl p-4 border border-slate-800 shadow-inner">
            <div class="flex justify-between text-[10px] text-slate-500 font-bold uppercase mb-3">
                <span>Current Partnership</span>
                <span>Runs Scored</span>
            </div>
            <div id="partnership-val" class="text-xl font-bold text-slate-300">0 Runs</div>
            <p class="text-xs text-slate-500 mt-1 italic">Last wicket at: 0</p>
        </div>
    </main>

    <section class="bg-slate-900 border-t border-slate-800 p-3 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.6)]">
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2 mb-4">
            <button onclick="recordBall(0)" class="bg-slate-800 active:bg-blue-600 h-14 rounded-lg text-xl font-bold transition-all transform active:scale-90">0</button>
            <button onclick="recordBall(1)" class="bg-slate-800 active:bg-blue-600 h-14 rounded-lg text-xl font-bold transition-all transform active:scale-90">1</button>
            <button onclick="recordBall(2)" class="bg-slate-800 active:bg-blue-600 h-14 rounded-lg text-xl font-bold transition-all transform active:scale-90">2</button>
            <button onclick="recordBall(3)" class="bg-slate-800 active:bg-blue-600 h-14 rounded-lg text-xl font-bold transition-all transform active:scale-90">3</button>
            <button onclick="recordBall(4)" class="bg-slate-800 active:bg-green-700 h-14 rounded-lg text-xl font-bold transition-all transform active:scale-90 border-b-4 border-green-900">4</button>
            <button onclick="recordBall(6)" class="bg-slate-800 active:bg-green-700 h-14 rounded-lg text-xl font-bold transition-all transform active:scale-90 border-b-4 border-green-900">6</button>
            
            <button onclick="recordBall('Extra')" class="bg-orange-700 active:bg-orange-600 h-14 rounded-lg text-xs font-black uppercase">Extra</button>
            <button onclick="recordBall('W')" class="bg-red-700 active:bg-red-600 h-14 rounded-lg text-xs font-black uppercase border-b-4 border-red-900">Wicket</button>
        </div>

        <div class="max-w-xl mx-auto grid grid-cols-2 gap-4">
            <button onclick="undo()" class="py-3 text-[10px] uppercase font-bold tracking-widest text-slate-400 border border-slate-700 rounded-md active:bg-slate-800">Undo</button>
            <button onclick="exportMatch()" class="py-3 text-[10px] uppercase font-bold tracking-widest text-green-500 border border-green-900/40 bg-green-950/20 rounded-md active:bg-green-900/50">Export Match</button>
        </div>
    </section>

    <script>
        // Data State
        let match = JSON.parse(localStorage.getItem('match_v1')) || {
            runs: 0,
            wickets: 0,
            balls: 0,
            history: []
        };

        const scoreEl = document.getElementById('score-main');
        const oversEl = document.getElementById('overs-main');
        const tickerEl = document.getElementById('ticker');
        const partnerEl = document.getElementById('partnership-val');

        function updateUI() {
            // Update Score & Overs
            scoreEl.innerHTML = `${match.runs}<span class="text-slate-600 text-3xl font-light">/${match.wickets}</span>`;
            const ov = Math.floor(match.balls / 6);
            const bl = match.balls % 6;
            oversEl.innerText = `${ov}.${bl}`;
            partnerEl.innerText = `${match.runs} Runs`;

            // Update Recent Balls Ticker
            tickerEl.innerHTML = match.history.slice(-12).map(b => {
                let theme = "bg-slate-800 border-slate-700";
                if(b === 'W') theme = "bg-red-900 border-red-500 text-white font-bold";
                if(b === 4 || b === 6) theme = "bg-green-900 border-green-500 text-green-400 font-bold";
                if(b === '+1') theme = "bg-orange-900 border-orange-500 text-orange-300";
                return `<div class="w-9 h-9 rounded-full flex items-center justify-center text-xs border ${theme} flex-shrink-0">${b}</div>`;
            }).reverse().join('');

            // Save to Local Memory
            localStorage.setItem('match_v1', JSON.stringify(match));
        }

        function recordBall(val) {
            if (val === 'W') {
                if(match.wickets < 10) match.wickets++;
                match.history.push('W');
                match.balls++;
            } else if (val === 'Extra') {
                match.runs++;
                match.history.push('+1');
                // Note: Extras usually don't count as a ball in the over
            } else {
                match.runs += val;
                match.history.push(val);
                match.balls++;
            }
            updateUI();
        }

        function undo() {
            if (match.history.length === 0) return;
            const last = match.history.pop();
            if (last === 'W') {
                match.wickets--;
                match.balls--;
            } else if (last === '+1') {
                match.runs--;
            } else {
                match.runs -= last;
                match.balls--;
            }
            updateUI();
        }

        function exportMatch() {
            const summary = `Match Score: ${match.runs}/${match.wickets} (${Math.floor(match.balls/6)}.${match.balls%6} Overs)`;
            alert(summary + "\n\nData saved to your device!");
        }

        //git  Initialize UI on first open
        updateUI();
    </script>

</body>
</html>
