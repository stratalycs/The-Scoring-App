<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Scorer Elite - Squad Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .ball-scroll::-webkit-scrollbar { height: 4px; }
        .ball-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .strike-glow { border: 2px solid #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .ball-wicket { background-color: #991b1b; border-color: #f87171; color: white; }
        .ball-boundary { background-color: #065f46; border-color: #34d399; color: white; }
        .ball-extra { background-color: #92400e; border-color: #fbbf24; color: white; }
        .ball-normal { background-color: #1e293b; border-color: #475569; color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans select-none">

    <div id="setup-overlay" class="fixed inset-0 z-50 bg-slate-950 flex flex-col p-6 overflow-y-auto hidden">
        <div class="max-w-xl mx-auto w-full space-y-6">
            <h2 class="text-2xl font-black text-blue-400 uppercase tracking-tighter">Match & Squad Setup</h2>
            
            <div class="grid grid-cols-2 gap-4 bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Total Overs</label>
                    <input type="number" id="setup-overs" value="20" class="w-full bg-slate-800 rounded-lg p-2 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Players</label>
                    <input type="number" id="setup-players" value="11" class="w-full bg-slate-800 rounded-lg p-2 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <input id="team1-name-setup" value="TEAM A" class="bg-transparent text-blue-500 font-black text-lg outline-none w-full border-b border-slate-800">
                    <textarea id="team1-squad" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 h-48 text-sm outline-none" placeholder="Enter Player Names (One per line)"></textarea>
                </div>
                <div class="space-y-3">
                    <input id="team2-name-setup" value="TEAM B" class="bg-transparent text-green-500 font-black text-lg outline-none w-full border-b border-slate-800">
                    <textarea id="team2-squad" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 h-48 text-sm outline-none" placeholder="Enter Player Names (One per line)"></textarea>
                </div>
            </div>

            <button onclick="confirmSetup()" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">START MATCH</button>
        </div>
    </div>

    <nav class="bg-slate-900 border-b border-slate-800 flex justify-around text-[10px] font-bold uppercase tracking-widest pt-3 sticky top-0 z-40">
        <button onclick="switchTab('live')" id="tab-live-btn" class="pb-3 px-6 tab-active">Live Scoring</button>
        <button onclick="switchTab('scorecard')" id="tab-score-btn" class="pb-3 px-6 text-slate-500">Scorecard</button>
    </nav>

    <div id="view-live" class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-slate-900 p-4 border-b border-slate-800">
            <div class="max-w-xl mx-auto flex justify-between items-start">
                <div>
                    <span id="team-display" class="text-blue-500 font-bold uppercase text-[10px] tracking-widest">TEAM A</span>
                    <h1 id="score-main" class="text-5xl font-black tabular-nums mt-1">0/0</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase mt-1">CRR: <span id="crr-val" class="text-blue-400">0.00</span></p>
                </div>
                <div class="text-right">
                    <p id="overs-main" class="text-3xl font-mono text-slate-300">0.0</p>
                    <div id="target-box" class="invisible text-[10px] text-orange-400 font-bold uppercase mt-1">
                        TGT: <span id="target-val">0</span> | RRR: <span id="rrr-val">0.00</span>
                    </div>
                </div>
            </div>

            <div class="max-w-xl mx-auto grid grid-cols-2 gap-3 mt-4">
                <div id="b1-card" class="border border-slate-800 rounded-xl p-3">
                    <select id="b1-select" onchange="assignPlayer(1, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-slate-400 mb-1">
                        <option value="">Select Striker</option>
                    </select>
                    <p class="text-xl font-black"><span id="b1-runs">0</span> <span class="text-xs text-slate-500 font-normal">(<span id="b1-balls">0</span>)</span></p>
                </div>
                <div id="b2-card" class="border border-slate-800 rounded-xl p-3 text-right">
                    <select id="b2-select" onchange="assignPlayer(2, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-slate-400 mb-1 text-right">
                        <option value="">Select Non-Striker</option>
                    </select>
                    <p class="text-xl font-black"><span id="b2-runs">0</span> <span class="text-xs text-slate-500 font-normal">(<span id="b2-balls">0</span>)</span></p>
                </div>
            </div>

            <div class="max-w-xl mx-auto mt-3 flex items-center justify-between bg-slate-950/50 p-2 rounded-lg border border-slate-800">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Bowler</span>
                <select id="bowler-select" onchange="assignBowler(this.value)" class="bg-transparent text-xs font-bold text-blue-400 outline-none text-right">
                    <option value="">Select Bowler</option>
                </select>
            </div>
            <div id="ticker" class="ball-scroll flex gap-3 overflow-x-auto py-3 flex-row-reverse mt-1 h-16 items-center"></div>
        </header>
        
        <main class="flex-1 p-4 flex flex-col justify-center">
            <div id="info-val" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 text-center font-bold text-blue-400 text-lg">Pick Players to Start</div>
        </main>
    </div>

    <div id="view-scorecard" class="flex-1 overflow-y-auto p-4 hidden pb-24">
        <div id="scorecard-container" class="max-w-xl mx-auto space-y-6"></div>
    </div>

    <section class="bg-slate-900 border-t border-slate-800 p-3 pb-8 sticky bottom-0 z-50">
        <div id="scoring-buttons" class="max-w-xl mx-auto grid grid-cols-4 gap-2 mb-4">
            <button onclick="recordBall(0)" class="bg-slate-800 h-14 rounded-xl text-xl font-bold active:bg-blue-600">0</button>
            <button onclick="recordBall(1)" class="bg-slate-800 h-14 rounded-xl text-xl font-bold active:bg-blue-600">1</button>
            <button onclick="recordBall(2)" class="bg-slate-800 h-14 rounded-xl text-xl font-bold active:bg-blue-600">2</button>
            <button onclick="recordBall(3)" class="bg-slate-800 h-14 rounded-xl text-xl font-bold active:bg-blue-600">3</button>
            <button onclick="recordBall(4)" class="bg-slate-800 h-14 rounded-xl text-xl font-bold border-b-4 border-green-700 active:bg-green-700">4</button>
            <button onclick="recordBall(6)" class="bg-slate-800 h-14 rounded-xl text-xl font-bold border-b-4 border-green-700 active:bg-green-700">6</button>
            <button onclick="recordExtra('WD')" class="bg-orange-900/40 h-14 rounded-xl text-[10px] font-black border-b-4 border-orange-700">WIDE</button>
            <button onclick="recordBall('W')" class="bg-red-900/40 h-14 rounded-xl text-[10px] font-black border-b-4 border-red-700">WICKET</button>
        </div>
        <div class="max-w-xl mx-auto grid grid-cols-3 gap-2">
            <button onclick="nextInnings()" class="py-3 bg-blue-900/10 text-[10px] font-bold text-blue-400 border border-blue-900/30 rounded-lg uppercase">Inn 2</button>
            <button onclick="exportToExcel()" class="py-3 bg-green-900/10 text-[10px] font-bold text-green-500 border border-green-900/30 rounded-lg uppercase">Excel</button>
            <button onclick="triggerSetup()" class="py-3 bg-red-900/10 text-[10px] font-bold text-red-500 border border-red-900/30 rounded-lg uppercase">New</button>
        </div>
    </section>

    <script>
        let match = JSON.parse(localStorage.getItem('match_vSquad')) || null;

        function triggerSetup() { document.getElementById('setup-overlay').classList.remove('hidden'); }

        function confirmSetup() {
            const p1 = document.getElementById('team1-squad').value.split('\n').filter(n => n.trim());
            const p2 = document.getElementById('team2-squad').value.split('\n').filter(n => n.trim());
            
            match = {
                overs: parseInt(document.getElementById('setup-overs').value) || 20,
                wickets: (parseInt(document.getElementById('setup-players').value) || 11) - 1,
                curr: 1, striker: 1, isFinished: false,
                b1: null, b2: null, bowler: "",
                t1: { name: document.getElementById('team1-name-setup').value, squad: p1, r: 0, w: 0, b: 0, h: [], batStats: [], bowlStats: [] },
                t2: { name: document.getElementById('team2-name-setup').value, squad: p2, r: 0, w: 0, b: 0, h: [], batStats: [], bowlStats: [] }
            };
            document.getElementById('setup-overlay').classList.add('hidden');
            save();
        }

        function getActive() { return match.curr === 1 ? match.t1 : match.t2; }
        function getFielding() { return match.curr === 1 ? match.t2 : match.t1; }
        function fOver(b) { return Math.floor(b/6) + "." + (b%6); }

        function assignPlayer(slot, name) {
            if(!name) return;
            const batObj = { name: name, r: 0, b: 0, out: false };
            if(slot === 1) match.b1 = batObj;
            else match.b2 = batObj;
            save();
        }

        function assignBowler(name) {
            match.bowler = name;
            save();
        }

        function recordExtra(type) {
            if(!match.b1 || !match.b2) return alert("Select both batsmen first!");
            const a = getActive();
            a.r++;
            updateBowlStats(match.bowler, 1, 0, false);
            a.h.push({ v: type, n: fOver(a.b), class: 'ball-extra' });
            save();
        }

        function recordBall(v) {
            if(!match.b1 || !match.b2 || !match.bowler) return alert("Select Batsmen and Bowler first!");
            const a = getActive();
            let cb = (match.striker === 1) ? match.b1 : match.b2;

            if(v === 'W') {
                a.w++; a.b++; cb.b++; cb.out = true;
                updateBowlStats(match.bowler, 0, 1, true);
                updateBatStats(cb);
                a.h.push({ v: 'W', n: fOver(a.b), class: 'ball-wicket' });
                if(a.w >= match.wickets) endInnings();
                else {
                    if(match.striker === 1) match.b1 = null; else match.b2 = null;
                }
            } else {
                a.r += v; a.b++; cb.r += v; cb.b++;
                updateBowlStats(match.bowler, v, 0, true);
                a.h.push({ v: v, n: fOver(a.b), class: v === 4 || v === 6 ? 'ball-boundary' : 'ball-normal' });
                if(v % 2 !== 0) match.striker = (match.striker === 1) ? 2 : 1;
            }

            if(match.curr === 2 && a.r > match.t1.r) match.isFinished = true;
            else if(a.b % 6 === 0 && v !== 'W') {
                match.striker = (match.striker === 1) ? 2 : 1;
                match.bowler = ""; // Force new bowler selection
            }
            save();
        }

        function updateBatStats(bat) {
            const a = getActive();
            let idx = a.batStats.findIndex(p => p.name === bat.name);
            if(idx > -1) a.batStats[idx] = JSON.parse(JSON.stringify(bat));
            else a.batStats.push(JSON.parse(JSON.stringify(bat)));
        }

        function updateBowlStats(name, runs, wicks, isBall) {
            const f = getFielding();
            let idx = f.bowlStats.findIndex(p => p.name === name);
            if(idx === -1) f.bowlStats.push({name, r: runs, w: wicks, b: isBall?1:0});
            else { f.bowlStats[idx].r += runs; f.bowlStats[idx].w += wicks; if(isBall) f.bowlStats[idx].b++; }
        }

        function save() { 
            if(match.b1) updateBatStats(match.b1);
            if(match.b2) updateBatStats(match.b2);
            localStorage.setItem('match_vSquad', JSON.stringify(match)); 
            updateUI(); 
        }

        function updateUI() {
            if(!match) { triggerSetup(); return; }
            const a = getActive();
            const f = getFielding();
            
            document.getElementById('team-display').innerText = a.name;
            document.getElementById('score-main').innerText = a.r + "/" + a.w;
            document.getElementById('overs-main').innerText = fOver(a.b);

            // Update Selectors
            const updateSelector = (id, current, squad) => {
                const el = document.getElementById(id);
                const val = current ? current.name : "";
                let html = `<option value="">Select Player</option>`;
                squad.forEach(p => {
                    const hasBatted = a.batStats.find(s => s.name === p && s.out && (!current || s.name !== current.name));
                    if(!hasBatted) html += `<option value="${p}" ${p === val ? 'selected' : ''}>${p}</option>`;
                });
                el.innerHTML = html;
            };

            updateSelector('b1-select', match.b1, a.squad);
            updateSelector('b2-select', match.b2, a.squad);
            
            let bHtml = `<option value="">Select Bowler</option>`;
            f.squad.forEach(p => bHtml += `<option value="${p}" ${p === match.bowler ? 'selected' : ''}>${p}</option>`);
            document.getElementById('bowler-select').innerHTML = bHtml;

            document.getElementById('b1-runs').innerText = match.b1 ? match.b1.r : 0;
            document.getElementById('b1-balls').innerText = match.b1 ? match.b1.b : 0;
            document.getElementById('b2-runs').innerText = match.b2 ? match.b2.r : 0;
            document.getElementById('b2-balls').innerText = match.b2 ? match.b2.b : 0;

            document.getElementById('b1-card').className = match.striker === 1 ? 'border border-slate-800 rounded-xl p-3 strike-glow' : 'border border-slate-800 rounded-xl p-3';
            document.getElementById('b2-card').className = match.striker === 2 ? 'border border-slate-800 rounded-xl p-3 strike-glow text-right' : 'border border-slate-800 rounded-xl p-3 text-right';

            document.getElementById('ticker').innerHTML = a.h.slice(-10).map(b => `
                <div class="flex flex-col items-center flex-shrink-0">
                    <div class="w-10 h-10 rounded-full border-2 flex items-center justify-center text-[10px] font-black ${b.class}">${b.v}</div>
                </div>
            `).reverse().join('');
        }

        function switchTab(tab) {
            document.getElementById('view-live').classList.toggle('hidden', tab !== 'live');
            document.getElementById('view-scorecard').classList.toggle('hidden', tab !== 'scorecard');
            if(tab === 'scorecard')
