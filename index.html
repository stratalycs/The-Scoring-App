<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Scorer Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #setup-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 100;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .setup-input {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            color: white;
            margin-bottom: 16px;
            outline: none;
        }

        .setup-input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .strike-glow { border: 2px solid #3b82f6 !important; background: rgba(59, 130, 246, 0.1); }
        .tab-active { color: #3b82f6 !important; border-bottom: 2px solid #3b82f6 !important; }

        .ball-circle {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; flex-shrink: 0;
        }
        .ball-wicket { background: #991b1b; color: white; }
        .ball-boundary { background: #065f46; color: white; }
        .ball-normal { background: #1e293b; border: 1px solid #334155; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h2 class="text-2xl font-bold mb-6 text-blue-500 tracking-tighter">MATCH SETUP</h2>
        <div class="flex-1 overflow-y-auto">
            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Match Type</label>
            <select id="setup-type" onchange="toggleOversInput(this.value)" class="setup-input">
                <option value="limited">Limited Overs (T20 / ODI)</option>
                <option value="test">Test Match (Multi-Innings)</option>
            </select>

            <div class="grid grid-cols-2 gap-4">
                <div id="overs-input-wrapper">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Total Overs</label>
                    <input type="number" id="setup-overs" value="20" class="setup-input">
                </div>
                <div id="day-overs-input-wrapper">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Max Overs / Day</label>
                    <input type="number" id="setup-day-overs" value="90" class="setup-input">
                </div>
            </div>

            <div class="grid grid-cols-1 mb-2">
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Players Per Team</label>
                <input type="number" id="setup-players" value="11" class="setup-input">
            </div>
            
            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Team A Squad</label>
            <textarea id="team1-squad" class="setup-input h-20" placeholder="Player Names (one per line)"></textarea>
            
            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Team B Squad</label>
            <textarea id="team2-squad" class="setup-input h-20" placeholder="Player Names (one per line)"></textarea>
        </div>
        <button onclick="confirmSetup()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-4 uppercase tracking-wider">Start Match</button>
    </div>

    <nav class="flex justify-around bg-slate-900 border-b border-slate-800 shrink-0">
        <button onclick="switchTab('live')" id="tab-live-btn" class="py-4 px-6 tab-active font-bold text-xs tracking-wider">LIVE</button>
        <button onclick="switchTab('scorecard')" id="tab-score-btn" class="py-4 px-6 text-slate-500 font-bold text-xs tracking-wider">SCORECARD</button>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 no-scrollbar">
        <div id="view-live">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span id="team-display" class="text-blue-500 font-bold text-xs tracking-wide">TEAM A</span>
                    <span id="innings-badge" class="ml-2 bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded-full font-bold">Inn 1</span>
                    <span id="day-badge" class="hidden ml-1 bg-amber-950 text-amber-400 text-[10px] px-2 py-0.5 rounded-full font-bold">Day 1</span>
                    <h1 id="score-main" class="text-5xl font-black mt-1">0/0</h1>
                    <p id="match-status" class="text-[11px] font-medium text-slate-400 mt-2"></p>
                </div>
                <div class="text-right">
                    <p id="overs-main" class="text-3xl text-slate-400">0.0</p>
                    <p id="day-overs-tracker" class="hidden text-[10px] text-slate-500 font-bold mt-1 uppercase">Day Overs: <span id="day-overs-val">0.0</span></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div id="b1-card" class="p-3 rounded-xl border border-slate-800 bg-slate-900/50">
                    <select id="b1-select" onchange="assignPlayer(1, this.value)" class="bg-transparent text-blue-400 font-bold w-full mb-1 outline-none text-xs uppercase"></select>
                    <p class="text-xl font-bold"><span id="b1-runs">0</span> <span class="text-xs text-slate-500">(<span id="b1-balls">0</span>)</span></p>
                </div>
                <div id="b2-card" class="p-3 rounded-xl border border-slate-800 bg-slate-900/50">
                    <select id="b2-select" onchange="assignPlayer(2, this.value)" class="bg-transparent text-blue-400 font-bold w-full mb-1 outline-none text-xs uppercase"></select>
                    <p class="text-xl font-bold"><span id="b2-runs">0</span> <span class="text-xs text-slate-500">(<span id="b2-balls">0</span>)</span></p>
                </div>
            </div>

            <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 flex justify-between items-center mb-6">
                <span class="text-xs font-bold text-slate-500 tracking-wider">BOWLER</span>
                <select id="bowler-select" onchange="assignBowler(this.value)" class="bg-transparent text-blue-400 font-bold outline-none text-xs text-right uppercase"></select>
            </div>

            <div id="ticker" class="flex gap-2 overflow-x-auto py-2 flex-row-reverse no-scrollbar"></div>
        </div>

        <div id="view-scorecard" class="hidden">
            <div id="scorecard-container" class="space-y-4 pb-6"></div>
        </div>
    </main>

    <footer class="bg-slate-900 p-4 border-t border-slate-800 shrink-0">
        <div class="grid grid-cols-4 gap-2 mb-3">
            <button onclick="recordBall(0)" class="bg-slate-800 h-12 rounded-lg font-bold">0</button>
            <button onclick="recordBall(1)" class="bg-slate-800 h-12 rounded-lg font-bold">1</button>
            <button onclick="recordBall(2)" class="bg-slate-800 h-12 rounded-lg font-bold">2</button>
            <button onclick="recordBall(3)" class="bg-slate-800 h-12 rounded-lg font-bold">3</button>
            <button onclick="recordBall(4)" class="bg-emerald-900/40 text-emerald-400 h-12 rounded-lg font-bold">4</button>
            <button onclick="recordBall(6)" class="bg-emerald-900/40 text-emerald-400 h-12 rounded-lg font-bold">6</button>
            <button onclick="recordExtra()" class="bg-amber-900/40 text-amber-400 h-12 rounded-lg font-bold">EX</button>
            <button onclick="recordBall('W')" class="bg-red-900/40 text-red-400 h-12 rounded-lg font-bold">W</button>
        </div>
        <div class="grid grid-cols-4 gap-2">
            <button onclick="undoBall()" class="bg-slate-800 py-2 text-[10px] rounded text-slate-400 font-bold">UNDO</button>
            <button onclick="handleTransitionButton()" id="trans-btn" class="bg-blue-900/40 py-2 text-[10px] rounded text-blue-400 font-bold">NEXT INN</button>
            <button onclick="exportToExcel()" class="bg-emerald-900/40 py-2 text-[10px] rounded text-emerald-400 font-bold">EXCEL</button>
            <button onclick="triggerSetup()" class="bg-red-900/40 py-2 text-[10px] rounded text-red-400 font-bold">NEW</button>
        </div>
    </footer>

    <script>
        let match = JSON.parse(localStorage.getItem('cricket_multi_v4')) || null;
        let history = [];

        function toggleOversInput(type) {
            const isTest = type === 'test';
            
            // Handle element styling wrappers
            document.getElementById('overs-input-wrapper').style.opacity = isTest ? '0.3' : '1';
            document.getElementById('day-overs-input-wrapper').style.opacity = isTest ? '1' : '0.3';
            
            // Safely alter system disabled flags
            document.getElementById('setup-overs').disabled = isTest;
            document.getElementById('setup-day-overs').disabled = !isTest;
        }

        function triggerSetup() { 
            document.getElementById('setup-overlay').classList.remove('hidden'); 
            toggleOversInput(document.getElementById('setup-type').value);
        }

        function confirmSetup() {
            let p1 = document.getElementById('team1-squad').value.split('\n').filter(n => n.trim());
            let p2 = document.getElementById('team2-squad').value.split('\n').filter(n => n.trim());
            let type = document.getElementById('setup-type').value;
            let totalPlayers = parseInt(document.getElementById('setup-players').value) || 11;
            
            match = {
                type: type,
                maxInnings: type === 'test' ? 4 : 2,
                currentInningsIdx: 0,
                overs: type === 'test' ? Infinity : (parseInt(document.getElementById('setup-overs').value) || 20),
                maxDayOvers: type === 'test' ? (parseInt(document.getElementById('setup-day-overs').value) || 90) : null,
                currentDay: type === 'test' ? 1 : null,
                dayBallsBowled: type === 'test' ? 0 : null,
                wickets: totalPlayers - 1,
                striker: 1, b1: null, b2: null, bowler: "",
                teams: [
                    { name: "TEAM A", squad: p1.length ? p1 : Array.from({length: totalPlayers},(_,i)=>`T1 P${i+1}`) },
                    { name: "TEAM B", squad: p2.length ? p2 : Array.from({length: totalPlayers},(_,i)=>`T2 P${i+1}`) }
                ],
                innings: [ createInningsObject(0) ] 
            };
            document.getElementById('setup-overlay').classList.add('hidden');
            save();
        }

        function createInningsObject(teamIdx) {
            return { teamIdx: teamIdx, r: 0, w: 0, b: 0, h: [], batStats: [], bowlStats: [] };
        }

        function getActiveInnings() { return match.innings[match.currentInningsIdx]; }
        function getActiveTeam() { return match.teams[getActiveInnings().teamIdx]; }
        function getFieldingTeam() { return match.teams[getActiveInnings().teamIdx === 0 ? 1 : 0]; }
        function fOver(b) { return Math.floor(b/6) + "." + (b%6); }

        function save() {
            localStorage.setItem('cricket_multi_v4', JSON.stringify(match));
            updateUI();
        }

        function recordBall(v) {
            if (!match.b1 || !match.b2 || !match.bowler) return alert("Assign Players First");
            history.push(JSON.stringify(match));
            
            const inn = getActiveInnings();
            let cb = (match.striker === 1) ? match.b1 : match.b2;

            if (v === 'W') {
                inn.w++; inn.b++; cb.b++; cb.out = true;
                if (match.type === 'test') match.dayBallsBowled++;
                updateBowlStats(match.bowler, 0, 1, true);
                inn.h.push({ v: 'W', class: 'ball-wicket' });
                if (match.striker === 1) match.b1 = null; else match.b2 = null;
                
                if (inn.w >= match.wickets) {
                    alert("Innings complete! All Out.");
                    flagTransitionState();
                }
            } else {
                inn.r += v; inn.b++; cb.r += v; cb.b++;
                if (match.type === 'test') match.dayBallsBowled++;
                updateBowlStats(match.bowler, v, 0, true);
                inn.h.push({ v: v, class: v >= 4 ? 'ball-boundary' : 'ball-normal' });
                if (v % 2 !== 0) match.striker = match.striker === 1 ? 2 : 1;
                
                if (match.type === 'limited' && inn.b >= (match.overs * 6)) {
                    alert("Overs completed!");
                    flagTransitionState();
                }
            }

            if (match.type === 'test' && match.dayBallsBowled >= (match.maxDayOvers * 6)) {
                alert(`Stumps! Max overs (${match.maxDayOvers}) reached for Day ${match.currentDay}.`);
                flagTransitionState();
            }

            if (inn.b % 6 === 0 && v !== 'W') { 
                match.bowler = ""; 
                match.striker = match.striker === 1 ? 2 : 1; 
            }
            save();
        }

        function recordExtra() {
            if (!match.bowler) return alert("Select Bowler");
            history.push(JSON.stringify(match));
            getActiveInnings().r++; 
            updateBowlStats(match.bowler, 1, 0, false);
            getActiveInnings().h.push({ v: 'EX', class: 'ball-normal' });
            save();
        }

        function updateBowlStats(name, r, w, isBall) {
            const inn = getActiveInnings();
            let b = inn.bowlStats.find(x => x.name === name);
            if (!b) { b = { name, r: 0, w: 0, b: 0 }; inn.bowlStats.push(b); }
            b.r += r; b.w += w; if (isBall) b.b++;
        }

        function undoBall() { if (history.length) { match = JSON.parse(history.pop()); save(); } }

        function assignPlayer(slot, name) {
            const inn = getActiveInnings();
            let p = inn.batStats.find(x => x.name === name);
            if (!p) { p = { name, r: 0, b: 0, out: false }; inn.batStats.push(p); }
            if (slot === 1) match.b1 = p; else match.b2 = p;
            save();
        }

        function assignBowler(name) { match.bowler = name; save(); }

        function isDayOver() {
            return match.type === 'test' && match.dayBallsBowled >= (match.maxDayOvers * 6);
        }

        function flagTransitionState() {
            document.getElementById('trans-btn').classList.add('animate-pulse', 'bg-blue-600', 'text-white');
        }

        function handleTransitionButton() {
            if (!match) return;

            if (isDayOver()) {
                if (confirm(`Move to Day ${match.currentDay + 1}?`)) {
                    match.currentDay++;
                    match.dayBallsBowled = 0;
                    document.getElementById('trans-btn').classList.remove('animate-pulse', 'bg-blue-600', 'text-white');
                    save();
                }
                return;
            }

            const currentIdx = match.currentInningsIdx;
            if (currentIdx >= match.maxInnings - 1) {
                return alert("Match completed.");
            }

            let nextTeamIdx;
            if (match.type === 'limited') {
                nextTeamIdx = match.innings[0].teamIdx === 0 ? 1 : 0;
            } else {
                if (currentIdx === 0) nextTeamIdx = 1;
                else if (currentIdx === 1) nextTeamIdx = 0;
                else if (currentIdx === 2) nextTeamIdx = 1;
            }

            if (confirm(`Move to Innings ${currentIdx + 2}?`)) {
                match.currentInningsIdx++;
                match.innings.push(createInningsObject(nextTeamIdx));
                match.b1 = null; match.b2 = null; match.bowler = "";
                document.getElementById('trans-btn').classList.remove('animate-pulse', 'bg-blue-600', 'text-white');
                save();
                switchTab('live');
            }
        }

        function updateUI() {
            if (!match) return triggerSetup();
            
            document.getElementById('setup-overlay').classList.add('hidden');
            
            const inn = getActiveInnings();
            const team = getActiveTeam();
            
            document.getElementById('team-display').innerText = team.name;
            document.getElementById('innings-badge').innerText = `INN ${match.currentInningsIdx + 1}`;
            document.getElementById('score-main').innerText = `${inn.r}/${inn.w}`;
            document.getElementById('overs-main').innerText = fOver(inn.b);

            if (match.type === 'test') {
                document.getElementById('day-badge').classList.remove('hidden');
                document.getElementById('day-badge').innerText = `DAY ${match.currentDay}`;
                document.getElementById('day-overs-tracker').classList.remove('hidden');
                document.getElementById('day-overs-val').innerText = fOver(match.dayBallsBowled);
            } else {
                document.getElementById('day-badge').classList.add('hidden');
                document.getElementById('day-overs-tracker').classList.add('hidden');
            }

            const actionBtn = document.getElementById('trans-btn');
            if (isDayOver()) {
                actionBtn.innerText = "NEXT DAY";
                flagTransitionState();
            } else {
                actionBtn.innerText = match.currentInningsIdx >= match.maxInnings - 1 ? "END MATCH" : "NEXT INN";
            }

            let statusText = "";
            if (match.type === 'test') {
                statusText = calculateTestRunningTotals();
            } else if (match.type === 'limited' && match.currentInningsIdx === 1) {
                let target = match.innings[0].r + 1;
                statusText = `Target: ${target} | Need ${target - inn.r} runs off ${ (match.overs * 6) - inn.b } balls`;
            }
            document.getElementById('match-status').innerText = statusText;

            const popBat = (id, cur, squad) => {
                let h = `<option value="">Select Batter</option>`;
                squad.forEach(s => {
                    const isOut = inn.batStats.find(x => x.name === s && x.out);
                    if (!isOut) h += `<option value="${s}" ${cur?.name === s ? 'selected' : ''}>${s}</option>`;
                });
                document.getElementById(id).innerHTML = h;
            };
            popBat('b1-select', match.b1, team.squad);
            popBat('b2-select', match.b2, team.squad);

            let bh = `<option value="">Select Bowler</option>`;
            getFieldingTeam().squad.forEach(s => bh += `<option value="${s}" ${match.bowler === s ? 'selected' : ''}>${s}</option>`);
            document.getElementById('bowler-select').innerHTML = bh
