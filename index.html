<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cricket Scorer Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            background-color: #020617; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: system-ui, sans-serif;
            color: #f1f5f9;
        }

        /* Restoration of the high-contrast layout from your screenshot */
        .setup-input {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            outline: none;
            color: white;
            font-weight: 600;
        }

        .setup-card {
            background-color: rgba(30, 41, 59, 0.3);
            border: 1px solid #1e293b;
            border-radius: 20px;
            padding: 20px;
        }

        .strike-glow { 
            border: 2px solid #3b82f6 !important; 
            background-color: rgba(59, 130, 246, 0.1); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); 
        }
        
        .tab-active { 
            color: #3b82f6 !important; 
            border-bottom: 2px solid #3b82f6 !important; 
        }

        .ball-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .ball-wicket { background: #991b1b; color: white; }
        .ball-boundary { background: #065f46; color: white; }
        .ball-extra { background: #92400e; color: white; }
        .ball-normal { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; }

        #view-live, #view-scorecard {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Hides scrollbar for clean app look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <div id="setup-overlay" class="fixed inset-0 z-[100] bg-[#020617] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-[#3b82f6] uppercase tracking-tighter">Match Setup</h1>
            <span class="bg-blue-900/40 text-blue-400 text-[9px] font-bold px-3 py-1 rounded-full border border-blue-500/30">MATCH #<span id="m-count">0</span></span>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto no-scrollbar">
            <div class="grid grid-cols-2 gap-4 setup-card">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Total Overs</label>
                    <input type="number" id="setup-overs" value="20" class="setup-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Players</label>
                    <input type="number" id="setup-players" value="11" class="setup-input">
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <h3 class="text-blue-500 font-black mb-3 uppercase tracking-widest text-sm">Team A</h3>
                    <textarea id="team1-squad" class="setup-input h-32 text-sm" placeholder="Team A Players (one per line)"></textarea>
                </div>
                <div>
                    <h3 class="text-green-500 font-black mb-3 uppercase tracking-widest text-sm">Team B</h3>
                    <textarea id="team2-squad" class="setup-input h-32 text-sm" placeholder="Team B Players (one per line)"></textarea>
                </div>
            </div>
        </div>

        <button onclick="confirmSetup()" class="w-full bg-[#2563eb] text-white font-black py-5 rounded-2xl mt-6 uppercase tracking-widest shadow-xl active:scale-95 transition-transform">
            Start Match
        </button>
    </div>

    <nav class="bg-[#020617] border-b border-slate-900 flex justify-around text-[10px] font-bold uppercase tracking-[0.2em] pt-4">
        <button onclick="switchTab('live')" id="tab-live-btn" class="pb-3 px-8 tab-active text-blue-400">Live Scoring</button>
        <button onclick="switchTab('scorecard')" id="tab-score-btn" class="pb-3 px-8 text-slate-500">Scorecard</button>
    </nav>

    <div id="view-live" class="flex flex-col p-5">
        <div class="flex justify-between items-start mb-6">
            <div>
                <span id="team-display" class="text-blue-500 font-bold uppercase text-xs tracking-widest">TEAM A</span>
                <h1 id="score-main" class="text-6xl font-black mt-2">0/0</h1>
                <p class="text-xs font-bold text-slate-500 mt-2 uppercase">CRR: <span id="crr-val" class="text-blue-400">0.00</span></p>
            </div>
            <div class="text-right">
                <p id="overs-main" class="text-4xl font-light text-slate-400">0.0</p>
                <div id="target-box" class="hidden bg-orange-950/30 border border-orange-500/30 rounded-lg px-2 py-1 mt-2">
                    <span class="text-[9px] text-orange-400 font-bold uppercase">Target: <span id="target-val">0</span></span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3 mb-4">
            <div id="b1-card" class="flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/20">
                <select id="b1-select" onchange="assignPlayer(1, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-blue-400 mb-2"></select>
                <p class="text-2xl font-black"><span id="b1-runs">0</span><span class="text-sm text-slate-500 ml-1">(<span id="b1-balls">0</span>)</span></p>
            </div>
            
            <button onclick="swapStrike()" class="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center border border-slate-700 active:bg-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
            </button>

            <div id="b2-card" class="flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/20 text-right">
                <select id="b2-select" onchange="assignPlayer(2, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-blue-400 mb-2 text-right"></select>
                <p class="text-2xl font-black"><span id="b2-runs">0</span><span class="text-sm text-slate-500 ml-1">(<span id="b2-balls">0</span>)</span></p>
            </div>
        </div>

        <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-800 flex justify-between items-center mb-6">
            <span class="text-[10px] font-bold text-slate-500 uppercase">Current Bowler</span>
            <select id="bowler-select" onchange="assignBowler(this.value)" class="bg-transparent text-xs font-black text-blue-400 outline-none text-right"></select>
        </div>

        <div id="ticker" class="flex gap-3 overflow-x-auto py-2 flex-row-reverse no-scrollbar mb-4"></div>
        <div id="info-val" class="text-center text-[10px] font-bold text-slate-600 uppercase tracking-widest mt-auto mb-4">Live Session Active</div>
    </div>

    <div id="view-scorecard" class="hidden p-5 pb-32">
        <div id="scorecard-container" class="space-y-6"></div>
    </div>

    <section class="bg-slate-900/80 border-t border-slate-800 p-4 pb-10">
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2 mb-4">
            <button onclick="recordBall(0)" class="bg-slate-800 h-14 rounded-xl font-bold text-lg active:bg-slate-700">0</button>
            <button onclick="recordBall(1)" class="bg-slate-800 h-14 rounded-xl font-bold text-lg active:bg-slate-700">1</button>
            <button onclick="recordBall(2)" class="bg-slate-800 h-14 rounded-xl font-bold text-lg active:bg-slate-700">2</button>
            <button onclick="recordBall(3)" class="bg-slate-800 h-14 rounded-xl font-bold text-lg active:bg-slate-700">3</button>
            <button onclick="recordBall(4)" class="bg-emerald-900/20 border border-emerald-500/30 h-14 rounded-xl font-black text-emerald-400">4</button>
            <button onclick="recordBall(6)" class="bg-emerald-900/20 border border-emerald-500/30 h-14 rounded-xl font-black text-emerald-400">6</button>
            <button onclick="recordExtra()" class="bg-amber-900/20 border border-amber-500/30 h-14 rounded-xl text-[10px] font-black text-amber-500 uppercase">Extra</button>
            <button onclick="recordBall('W')" class="bg-red-900/20 border border-red-500/30 h-14 rounded-xl text-[10px] font-black text-red-500 uppercase">Wicket</button>
        </div>
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2">
            <button onclick="undoBall()" class="py-3 bg-slate-800 text-[9px] font-bold text-slate-400 rounded-lg uppercase">Undo</button>
            <button onclick="nextInnings()" class="py-3 bg-blue-900/20 text-[9px] font-bold text-blue-400 rounded-lg uppercase">Inn 2</button>
            <button onclick="exportToExcel()" class="py-3 bg-emerald-900/20 text-[9px] font-bold text-emerald-400 rounded-lg uppercase">Excel</button>
            <button onclick="triggerSetup()" class="py-3 bg-red-900/20 text-[9px] font-bold text-red-400 rounded-lg uppercase">New</button>
        </div>
    </section>

    <script>
        // PWA & Core Logic
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

        let match = JSON.parse(localStorage.getItem('match_elite_restored')) || null;
        let history = [];
        let mCount = parseInt(localStorage.getItem('m_count')) || 0;

        function save() {
            localStorage.setItem('match_elite_restored', JSON.stringify(match));
            localStorage.setItem('m_count', mCount);
            updateUI();
        }

        function triggerSetup() { 
            document.getElementById('m-count').innerText = mCount;
            document.getElementById('setup-overlay').classList.remove('hidden'); 
        }

        function confirmSetup() {
            let p1 = document.getElementById('team1-squad').value.split('\n').filter(n => n.trim());
            let p2 = document.getElementById('team2-squad').value.split('\n').filter(n => n.trim());
            mCount++;
            match = {
                overs: parseInt(document.getElementById('setup-overs').value) || 20,
                wickets: (parseInt(document.getElementById('setup-players').value) || 11) - 1,
                curr: 1, striker: 1,
                b1: null, b2: null, bowler: "",
                t1: { name: "TEAM A", squad: p1.length ? p1 : Array.from({length:11},(_,i)=>`T1 P${i+1}`), r:0, w:0, b:0, h:[], batStats:[], bowlStats:[] },
                t2: { name: "TEAM B", squad: p2.length ? p2 : Array.from({length:11},(_,i)=>`T2 P${i+1}`), r:0, w:0, b:0, h:[], batStats:[], bowlStats:[] }
            };
            document.getElementById('setup-overlay').classList.add('hidden');
            save();
        }

        function getActive() { return match.curr === 1 ? match.t1 : match.t2; }
        function getFielding() { return match.curr === 1 ? match.t2 : match.t1; }
        function fOver(b) { return Math.floor(b/6) + "." + (b%6); }

        function swapStrike() {
            if(!match) return;
            match.striker = (match.striker === 1) ? 2 : 1;
            save();
        }

        function recordBall(v) {
            if(!match.b1 || !match.b2 || !match.bowler) return alert("Select Players!");
            history.push(JSON.stringify(match));
            const a = getActive();
            let cb = (match.striker === 1) ? match.b1 : match.b2;

            if(v === 'W') {
                a.w++; a.b++; cb.b++; cb.out = true;
                updateBowlStats(match.bowler, 0, 1, true);
                a.h.push({ v: 'W', class: 'ball-wicket' });
                if(a.w >= match.wickets) nextInnings();
                else { if(match.striker === 1) match.b1 = null; else match.b2 = null; }
            } else {
                a.r += v; a.b++; cb.r += v; cb.b++;
                updateBowlStats(match.bowler, v, 0, true);
                a.h.push({ v: v, class: v >= 4 ? 'ball-boundary' : 'ball-normal' });
                if(v % 2 !== 0) swapStrike();
            }
            if(a.b % 6 === 0 && v !== 'W') { swapStrike(); match.bowler = ""; }
            save();
        }

        function recordExtra() {
            if(!match.bowler) return alert("Select Bowler!");
            history.push(JSON.stringify(match));
            const a = getActive(); a.r++;
            updateBowlStats(match.bowler, 1, 0, false);
            a.h.push({ v: 'EX', class: 'ball-extra' });
            save();
        }

        function updateBowlStats(name, r, w, isBall) {
            const f = getFielding();
            let b = f.bowlStats.find(x => x.name === name);
            if(!b) { b = {name, r:0, w:0, b:0}; f.bowlStats.push(b); }
            b.r += r; b.w += w; if(isBall) b.b++;
        }

        function undoBall() { if(history.length) { match = JSON.parse(history.pop()); save(); } }

        function assignPlayer(slot, name) {
            const a = getActive();
            let p = a.batStats.find(x => x.name === name);
            if(!p) { p = {name, r:0, b:0, out:false}; a.batStats.push(p); }
            if(slot === 1) match.b1 = p; else match.b2 = p;
            save();
        }

        function assignBowler(name) { match.bowler = name; save(); }

        function updateUI() {
            if(!match) return triggerSetup();
            const a = getActive();
            document.getElementById('score-main').innerText = `${a.r}/${a.w}`;
            document.getElementById('overs-main').innerText = fOver(a.b);
            document.getElementById('crr-val').innerText = a.b > 0 ? (a.r / (a.b/6)).toFixed(2) : "0.00";

            const popBat = (id, cur, squad) => {
                let h = `<option value="">Select Batter</option>`;
                squad.forEach(s => {
                    const isOut = a.batStats.find(x => x.name === s && x.out);
                    const isOther = (id === 'b1-select' ? match.b2?.name : match.b1?.name) === s;
                    if(!isOut && !isOther) h += `<option value="${s}" ${cur?.name === s ? 'selected' : ''}>${s}</option>`;
                });
                document.getElementById(id).innerHTML = h;
            };
            popBat('b1-select', match.b1, a.squad);
            popBat('b2-select', match.b2, a.squad);

            let bh = `<option value="">Select Bowler</option>`;
            getFielding().squad.forEach(s => bh += `<option value="${s}" ${match.bowler === s ? 'selected' : ''}>${s}</option>`);
            document.getElementById('bowler-select').innerHTML = bh;

            document.getElementById('b1-runs').innerText = match.b1?.r || 0;
            document.getElementById('b1-balls').innerText = match.b1?.b || 0;
            document.getElementById('b2-runs').innerText = match.b2?.r || 0;
            document.getElementById('b2-balls').innerText = match.b2?.b || 0;

            document.getElementById('b1-card').className = match.striker === 1 ? 'flex-1 border rounded-2xl p-4 strike-glow' : 'flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/20';
