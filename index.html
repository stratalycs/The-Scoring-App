<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cricket Scorer Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ABSOLUTE LOCKOUT - Prevents the browser from shifting the layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            position: fixed;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Fixed Header */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60px;
            z-index: 50;
            background: #020617;
            padding-top: env(safe-area-inset-top);
        }

        /* Fixed Footer - The "Safe" Lock */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 50;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 12px;
        }

        /* Scrollable Middle - Uses absolute calc to stay between header and footer */
        #content-wrapper {
            position: absolute;
            top: 60px;
            bottom: 180px; /* Space for the 2-row footer */
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
        }

        /* Full Screen Setup Overlay */
        #setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #020617;
            display: flex;
            flex-direction: column;
            padding: 24px;
            padding-top: calc(env(safe-area-inset-top) + 24px);
        }

        .setup-input {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            outline: none;
            color: white;
            font-size: 16px;
        }

        .strike-glow { 
            border: 2px solid #3b82f6 !important; 
            background-color: rgba(59, 130, 246, 0.1); 
        }
        
        .tab-active { 
            color: #3b82f6 !important; 
            border-bottom: 3px solid #3b82f6 !important; 
        }

        .ball-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .ball-wicket { background: #991b1b; color: white; }
        .ball-boundary { background: #065f46; color: white; }
        .ball-normal { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter">MATCH SETUP</h1>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto no-scrollbar pb-32">
            <div class="grid grid-cols-2 gap-4 bg-slate-900/50 p-5 rounded-2xl border border-slate-800">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Overs</label>
                    <input type="number" id="setup-overs" value="20" class="setup-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Players</label>
                    <input type="number" id="setup-players" value="11" class="setup-input">
                </div>
            </div>

            <div class="space-y-4">
                <textarea id="team1-squad" class="setup-input h-32" placeholder="Team A (one name per line)"></textarea>
                <textarea id="team2-squad" class="setup-input h-32" placeholder="Team B (one name per line)"></textarea>
            </div>
        </div>

        <div class="absolute bottom-10 left-6 right-6">
            <button onclick="confirmSetup()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest shadow-2xl">
                Start Match
            </button>
        </div>
    </div>

    <header>
        <nav class="flex justify-around text-[10px] font-bold uppercase tracking-widest h-full items-end">
            <button onclick="switchTab('live')" id="tab-live-btn" class="pb-3 px-8 tab-active text-blue-400">Live</button>
            <button onclick="switchTab('scorecard')" id="tab-score-btn" class="pb-3 px-8 text-slate-500">Scorecard</button>
        </nav>
    </header>

    <div id="content-wrapper">
        <div id="view-live">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="team-display" class="text-blue-500 font-bold uppercase text-[10px] tracking-widest">TEAM A</span>
                    <h1 id="score-main" class="text-6xl font-black mt-1">0/0</h1>
                    <p class="text-[10px] font-bold text-slate-500 mt-2 uppercase">CRR: <span id="crr-val" class="text-blue-400">0.00</span></p>
                </div>
                <div class="text-right">
                    <p id="overs-main" class="text-4xl font-light text-slate-400">0.0</p>
                    <div id="target-box" class="hidden bg-orange-950/40 border border-orange-500/30 rounded-lg px-2 py-1 mt-2 inline-block">
                        <span class="text-[9px] text-orange-400 font-bold uppercase">Target: <span id="target-val">0</span></span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 mb-6">
                <div id="b1-card" class="flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/30">
                    <select id="b1-select" onchange="assignPlayer(1, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-blue-400 mb-2"></select>
                    <p class="text-2xl font-black"><span id="b1-runs">0</span><span class="text-sm text-slate-500 ml-1">(<span id="b1-balls">0</span>)</span></p>
                </div>
                <button onclick="swapStrike()" class="bg-slate-800 w-11 h-11 rounded-full flex items-center justify-center border border-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                </button>
                <div id="b2-card" class="flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/30 text-right">
                    <select id="b2-select" onchange="assignPlayer(2, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-blue-400 mb-2 text-right"></select>
                    <p class="text-2xl font-black"><span id="b2-runs">0</span><span class="text-sm text-slate-500 ml-1">(<span id="b2-balls">0</span>)</span></p>
                </div>
            </div>

            <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-800 flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Bowler</span>
                <select id="bowler-select" onchange="assignBowler(this.value)" class="bg-transparent text-xs font-black text-blue-400 outline-none text-right"></select>
            </div>

            <div id="ticker" class="flex gap-3 overflow-x-auto py-2 flex-row-reverse no-scrollbar"></div>
        </div>

        <div id="view-scorecard" class="hidden pb-10">
            <div id="scorecard-container" class="space-y-6"></div>
        </div>
    </div>

    <footer>
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2 mb-4">
            <button onclick="recordBall(0)" class="bg-slate-800 h-14 rounded-xl font-bold">0</button>
            <button onclick="recordBall(1)" class="bg-slate-800 h-14 rounded-xl font-bold">1</button>
            <button onclick="recordBall(2)" class="bg-slate-800 h-14 rounded-xl font-bold">2</button>
            <button onclick="recordBall(3)" class="bg-slate-800 h-14 rounded-xl font-bold">3</button>
            <button onclick="recordBall(4)" class="bg-emerald-900/30 border border-emerald-500/30 h-14 rounded-xl font-black text-emerald-400">4</button>
            <button onclick="recordBall(6)" class="bg-emerald-900/30 border border-emerald-500/30 h-14 rounded-xl font-black text-emerald-400">6</button>
            <button onclick="recordExtra()" class="bg-amber-900/30 border border-amber-500/30 h-14 rounded-xl text-[10px] font-black text-amber-500 uppercase">Extra</button>
            <button onclick="recordBall('W')" class="bg-red-900/30 border border-red-500/30 h-14 rounded-xl text-[10px] font-black text-red-500 uppercase">Wicket</button>
        </div>
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2">
            <button onclick="undoBall()" class="py-3 bg-slate-800 text-[9px] font-bold text-slate-400 rounded-lg uppercase">Undo</button>
            <button onclick="nextInnings()" class="py-3 bg-blue-900/20 text-[9px] font-bold text-blue-400 rounded-lg uppercase">Inn 2</button>
            <button onclick="exportToExcel()" class="py-3 bg-emerald-900/20 text-[9px] font-bold text-emerald-400 rounded-lg uppercase">Excel</button>
            <button onclick="triggerSetup()" class="py-3 bg-red-900/20 text-[9px] font-bold text-red-400 rounded-lg uppercase">New</button>
        </div>
    </footer>

    <script>
        // Core Logic (Remains unchanged)
        let match = JSON.parse(localStorage.getItem('cricket_elite_final')) || null;
        let history = [];

        function save() {
            localStorage.setItem('cricket_elite_final', JSON.stringify(match));
            updateUI();
        }

        function triggerSetup() { 
            document.getElementById('setup-overlay').classList.remove('hidden'); 
        }

        function confirmSetup() {
            let p1 = document.getElementById('team1-squad').value.split('\n').filter(n => n.trim());
            let p2 = document.getElementById('team2-squad').value.split('\n').filter(n => n.trim());
            match = {
                overs: parseInt(document.getElementById('setup-overs').value) || 20,
                wickets: (parseInt(document.getElementById('setup-players').value) || 11) - 1,
                curr: 1, striker: 1, b1: null, b2: null, bowler: "",
                t1: { name: "TEAM A", squad: p1.length ? p1 : Array.from({length:11},(_,i)=>`T1 P${i+1}`), r:0, w:0, b:0, h:[], batStats:[], bowlStats:[] },
                t2: { name: "TEAM B", squad: p2.length ? p2 : Array.from({length:11},(_,i)=>`T2 P${i+1}`), r:0, w:0, b:0, h:[], batStats:[], bowlStats:[] }
            };
            document.getElementById('setup-overlay').classList.add('hidden');
            save();
        }

        function getActive() { return match.curr === 1 ? match.t1 : match.t2; }
        function getFielding() { return match.curr === 1 ? match.t2 : match.t1; }
        function fOver(b) { return Math.floor(b/6) + "." + (b%6); }

        function swapStrike() {
            if(!match) return;
            match.striker = (match.striker === 1) ? 2 : 1;
            save();
        }

        function recordBall(v) {
            if(!match.b1 || !match.b2 || !match.bowler) return alert("Select Players!");
            history.push(JSON.stringify(match));
            const a = getActive();
            let cb = (match.striker === 1) ? match.b1 : match.b2;

            if(v === 'W') {
                a.w++; a.b++; cb.b++; cb.out = true;
                updateBowlStats(match.bowler, 0, 1, true);
                a.h.push({ v: 'W', class: 'ball-wicket' });
                if(a.w >= match.wickets) nextInnings();
                else { if(match.striker === 1) match.b1 = null; else match.b2 = null; }
            } else {
                a.r += v; a.b++; cb.r += v; cb.b++;
                updateBowlStats(match.bowler, v, 0, true);
                a.h.push({ v: v, class: v >= 4 ? 'ball-boundary' : 'ball-normal' });
                if(v % 2 !== 0) swapStrike();
            }
            if(a.b % 6 === 0 && v !== 'W') { swapStrike(); match.bowler = ""; }
            save();
        }

        function recordExtra() {
            if(!match.bowler) return alert("Select Bowler!");
            history.push(JSON.stringify(match));
            const a = getActive(); a.r++;
            updateBowlStats(match.bowler, 1, 0, false);
            a.h.push({ v: 'EX', class: 'ball-extra' });
            save();
        }

        function updateBowlStats(name, r, w, isBall) {
            const f = getFielding();
            let b = f.bowlStats.find(x => x.name === name);
            if(!b) { b = {name, r:0, w:0, b:0}; f.bowlStats.push(b); }
            b.r += r; b.w += w; if(isBall) b.b++;
        }

        function undoBall() { if(history.length) { match = JSON.parse(history.pop()); save(); } }

        function assignPlayer(slot, name) {
            const a = getActive();
            let p = a.batStats.find(x => x.name === name);
            if(!p) { p = {name, r:0, b:0, out:false}; a.batStats.push(p); }
            if(slot === 1) match.b1 = p; else match.b2 = p;
            save();
        }

        function assignBowler(name) { match.bowler = name; save(); }

        function updateUI() {
            if(!match) return triggerSetup();
            const a = getActive();
            document.getElementById('score-main').innerText = `${a.r}/${a.w}`;
            document.getElementById('overs-main').innerText = fOver(a.b);
            document.getElementById('crr-val').innerText = a.b > 0 ? (a.r / (a.b/6)).toFixed(2) : "0.00";

            const popBat = (id, cur, squad) => {
                let h = `<option value="">Select Batter</option>`;
                squad.forEach(s => {
                    const isOut = a.batStats.find(x => x.name === s && x.out);
                    const isOther = (id === 'b1-select' ? match.b2?.name : match.b1?.name) === s;
                    if(!isOut && !isOther) h += `<option value="${s}" ${cur?.name === s ? 'selected' : ''}>${s}</option>`;
                });
                document.getElementById(id).innerHTML = h;
            };
            popBat('b1-select', match.b1, a.squad);
            popBat('b2-select', match.b2, a.squad);

            let bh = `<option value="">Select Bowler</option>`;
            getFielding().squad.forEach(s => bh += `<option value="${s}" ${match.bowler === s ? 'selected' : ''}>${s}</option>`);
            document.getElementById('bowler-select').innerHTML = bh;

            document.getElementById('b1-runs').innerText = match.b1?.r || 0;
            document.getElementById('b1-balls').innerText = match.b1?.b || 0;
            document.getElementById('b2-runs').innerText = match.b2?.r || 0;
            document.getElementById('b2-balls').innerText = match.b2?.b || 0;

            document.getElementById('b1-card').className = match.striker === 1 ? 'flex-1 border rounded-2xl p-4 strike-glow bg-blue-500/5' : 'flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/30';
            document.getElementById('b2-card').className = match.striker === 2 ? 'flex-1 border rounded-2xl p-4 strike-glow text-right bg-blue-500/5' : 'flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/30 text-right';

            document.getElementById('ticker').innerHTML = a.h.slice(-10).map(x => `<div class="ball-circle ${x.class}">${x.v}</div>`).reverse().join('');
            
            if(match.curr === 2) {
                document.getElementById('target-box').classList.remove('hidden');
                document.getElementById('target-val').innerText = match.t1.r + 1;
            }
        }

        function switchTab(t) {
            document.getElementById('view-live').classList.toggle('hidden', t !== 'live');
            document.getElementById('view-scorecard').classList.toggle('hidden', t !== 'scorecard');
            document.getElementById('tab-live-btn').className = t === 'live' ? 'pb-3 px-8 tab-active text-blue-400' : 'pb-3 px-8 text-slate-500';
            document.getElementById('tab-score-btn').className = t === 'scorecard' ? 'pb-3 px-8 tab-active text-blue-400' : 'pb-3 px-8 text-slate-500';
            if(t === 'scorecard') renderScorecard();
        }

        function renderScorecard() {
            const innings = (t, f) => `
                <div class="bg-slate-900/40 p-5 rounded-2xl border border-slate-800 mb-4">
                    <div class="flex justify-between mb-4 border-b border-slate-800 pb-2">
                        <span class="font-black text-blue-400 text-xs">${t.name}</span>
                        <span class="font-bold text-sm">${t.r}/${t.w} (${fOver(t.b)})</span>
                    </div>
                    <table class="w-full text-[11px] mb-4">
                        ${t.batStats.map(p => `<tr class="border-b border-slate-800/30"><td class="py-2">${p.name}${p.out?' (out)':'*'}</td><td class="text-right font-bold tabular-nums">${p.r}(${p.b})</td></tr>`).join('')}
                    </table>
                    <table class="w-full text-[10px] text-slate-500">
                        ${f.bowlStats.map(b => `<tr><td class="py-1">${b.name}</td><td class="text-right tabular-nums">${fOver(b.b)}-${b.r}-${b.w}</td></tr>`).join('')}
                    </table>
                </div>`;
            document.getElementById('scorecard-container').innerHTML = innings(match.t1, match.t2) + (match.curr === 2 ? innings(match.t2, match.t1) : "");
        }

        function nextInnings() { if(match.curr === 1) { match.curr = 2; match.b1 = null; match.b2 = null; match.bowler = ""; save(); switchTab('live'); } }

        function exportToExcel() {
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(match.t1.batStats), "Innings 1");
            XLSX.writeFile(wb, "Match_Report.xlsx");
        }

        if(!match) triggerSetup(); else updateUI();
    </script>
</body>
</html>
