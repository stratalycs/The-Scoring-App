<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cricket Scorer Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* GRID LAYOUT FIX */
        body { 
            background-color: #020617; 
            margin: 0; 
            height: 100dvh; /* Dynamic viewport height */
            display: grid;
            grid-template-rows: auto 1fr auto; /* Header, Body (flexible), Controls */
            overflow: hidden; 
            font-family: system-ui, sans-serif;
            color: #f1f5f9;
        }

        .setup-input {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            outline: none;
            color: white;
            font-size: 16px;
        }

        /* Middle area scrollable */
        #main-scroll-area {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
        }

        .strike-glow { 
            border: 2px solid #3b82f6 !important; 
            background-color: rgba(59, 130, 246, 0.1); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
        
        .tab-active { 
            color: #3b82f6 !important; 
            border-bottom: 3px solid #3b82f6 !important; 
        }

        .ball-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .ball-wicket { background: #991b1b; color: white; }
        .ball-boundary { background: #065f46; color: white; }
        .ball-normal { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="setup-overlay" class="fixed inset-0 z-[100] bg-[#020617] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-[#3b82f6] uppercase tracking-tighter">Match Setup</h1>
            <span class="bg-blue-900/40 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/30">PREMIUM</span>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto no-scrollbar">
            <div class="grid grid-cols-2 gap-4 bg-slate-900/40 p-5 rounded-2xl border border-slate-800">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Overs</label>
                    <input type="number" id="setup-overs" value="20" class="setup-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Players</label>
                    <input type="number" id="setup-players" value="11" class="setup-input">
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-blue-500 font-black uppercase text-[10px] tracking-widest">Team A Squad</h3>
                <textarea id="team1-squad" class="setup-input h-32" placeholder="One name per line"></textarea>
                
                <h3 class="text-green-500 font-black uppercase text-[10px] tracking-widest">Team B Squad</h3>
                <textarea id="team2-squad" class="setup-input h-32" placeholder="One name per line"></textarea>
            </div>
        </div>

        <button onclick="confirmSetup()" class="w-full bg-[#2563eb] text-white font-black py-5 rounded-2xl mt-4 uppercase tracking-widest shadow-lg">
            Start Match
        </button>
    </div>

    <header>
        <nav class="bg-[#020617] border-b border-slate-900 flex justify-around text-[10px] font-bold uppercase tracking-widest pt-5">
            <button onclick="switchTab('live')" id="tab-live-btn" class="pb-3 px-8 tab-active text-blue-400">Live Scoring</button>
            <button onclick="switchTab('scorecard')" id="tab-score-btn" class="pb-3 px-8 text-slate-500">Scorecard</button>
        </nav>
    </header>

    <main id="main-scroll-area">
        <div id="view-live" class="flex flex-col h-full">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <span id="team-display" class="text-blue-500 font-bold uppercase text-xs tracking-widest">TEAM A</span>
                    <h1 id="score-main" class="text-6xl font-black mt-2 tracking-tighter">0/0</h1>
                    <p class="text-xs font-bold text-slate-500 mt-2 uppercase">CRR: <span id="crr-val" class="text-blue-400">0.00</span></p>
                </div>
                <div class="text-right">
                    <p id="overs-main" class="text-4xl font-light text-slate-400">0.0</p>
                    <div id="target-box" class="hidden bg-orange-950/30 border border-orange-500/30 rounded-lg px-2 py-1 mt-2">
                        <span class="text-[9px] text-orange-400 font-bold uppercase">Target: <span id="target-val">0</span></span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 mb-6">
                <div id="b1-card" class="flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/20">
                    <select id="b1-select" onchange="assignPlayer(1, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-blue-400 mb-2"></select>
                    <p class="text-2xl font-black tabular-nums"><span id="b1-runs">0</span><span class="text-sm text-slate-500 ml-1">(<span id="b1-balls">0</span>)</span></p>
                </div>
                <button onclick="swapStrike()" class="bg-slate-800 w-11 h-11 rounded-full flex items-center justify-center border border-slate-700 active:bg-blue-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                </button>
                <div id="b2-card" class="flex-1 border border-slate-800 rounded-2xl p-4 bg-slate-900/20 text-right">
                    <select id="b2-select" onchange="assignPlayer(2, this.value)" class="bg-transparent text-[11px] font-bold w-full outline-none uppercase text-blue-400 mb-2 text-right"></select>
                    <p class="text-2xl font-black tabular-nums"><span id="b2-runs">0</span><span class="text-sm text-slate-500 ml-1">(<span id="b2-balls">0</span>)</span></p>
                </div>
            </div>

            <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-800 flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Bowler</span>
                <select id="bowler-select" onchange="assignBowler(this.value)" class="bg-transparent text-xs font-black text-blue-400 outline-none text-right pr-2"></select>
            </div>

            <div id="ticker" class="flex gap-3 overflow-x-auto py-2 flex-row-reverse no-scrollbar mb-4"></div>
        </div>

        <div id="view-scorecard" class="hidden pb-10">
            <div id="scorecard-container" class="space-y-6"></div>
        </div>
    </main>

    <footer class="bg-[#0f172a] border-t border-slate-800 p-4 pb-8">
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2 mb-4">
            <button onclick="recordBall(0)" class="bg-slate-800 h-14 rounded-xl font-bold active:bg-slate-700">0</button>
            <button onclick="recordBall(1)" class="bg-slate-800 h-14 rounded-xl font-bold active:bg-slate-700">1</button>
            <button onclick="recordBall(2)" class="bg-slate-800 h-14 rounded-xl font-bold active:bg-slate-700">2</button>
            <button onclick="recordBall(3)" class="bg-slate-800 h-14 rounded-xl font-bold active:bg-slate-700">3</button>
            <button onclick="recordBall(4)" class="bg-emerald-900/30 border border-emerald-500/40 h-14 rounded-xl font-black text-emerald-400">4</button>
            <button onclick="recordBall(6)" class="bg-emerald-900/30 border border-emerald-500/40 h-14 rounded-xl font-black text-emerald-400">6</button>
            <button onclick="recordExtra()" class="bg-amber-900/30 border border-amber-500/40 h-14 rounded-xl text-[10px] font-black text-amber-500 uppercase">Extra</button>
            <button onclick="recordBall('W')" class="bg-red-900/30 border border-red-500/40 h-14 rounded-xl text-[10px] font-black text-red-500 uppercase">Wicket</button>
        </div>
        <div class="max-w-xl mx-auto grid grid-cols-4 gap-2">
            <button onclick="undoBall()" class="py-3 bg-slate-800 text-[9px] font-bold text-slate-400 rounded-lg uppercase">Undo</button>
            <button onclick="nextInnings()" class="py-3 bg-blue-900/30 text-[9px] font-bold text-blue-400 rounded-lg uppercase">Inn 2</button>
            <button onclick="exportToExcel()" class="py-3 bg-emerald-900/30 text-[9px] font-bold text-emerald-400 rounded-lg uppercase">Excel</button>
            <button onclick="triggerSetup()" class="py-3 bg-red-900/30 text-[9px] font-bold text-red-400 rounded-lg uppercase">New</button>
        </div>
    </footer>

    <script>
        // Core Logic (Refined for the new Layout)
        let match = JSON.parse(localStorage.getItem('cricket_elite_final')) || null;
        let history = [];

        function save() {
            localStorage.setItem('cricket_elite_final', JSON.stringify(match));
            updateUI();
        }

        function triggerSetup() { document.getElementById('setup-overlay').classList.remove('hidden'); }

        function confirmSetup() {
            let p1 = document.getElementById('team1-squad').value.split('\n').filter(n => n.trim());
            let p2 = document.getElementById('team2-squad').value.split('\n').filter(n => n.trim());
            match = {
                overs: parseInt(document.getElementById('setup-overs').value) || 20,
                wickets: (parseInt(document.getElementById('setup-players').value) || 11) - 1,
                curr: 1, striker: 1, b1: null, b2: null, bowler: "",
                t1: { name: "TEAM A", squad: p1.length ? p1 : Array.from({length:11},(_,i)=>`T1 P${i+1}`), r:0, w:0, b:0, h:[], batStats:[], bowlStats:[] },
                t2: { name: "TEAM B", squad: p2.length ? p2 : Array.from({length:11},(_,i)=>`T2 P${i+1}`), r:0, w:0, b:0, h:[], batStats:[], bowlStats:[] }
            };
            document.getElementById('setup-overlay').classList.add('hidden');
            save();
        }

        function getActive() { return match.curr === 1 ? match.t1 : match.t2; }
        function getFielding() { return match.curr === 1 ? match.t2 : match.t1; }
        function fOver(b) { return Math.floor(b/6) + "." + (b%6); }

        function swapStrike() {
            if(!match) return;
            match.striker = (match.striker === 1) ? 2 : 1;
            save();
        }

        function recordBall(v) {
            if(!match.b1 || !match.b2 || !match.bowler) return alert("Please assign Batters and Bowler!");
            history.push(JSON.stringify(match));
            const a = getActive();
            let cb = (match.striker === 1) ? match.b1 : match.b2;

            if(v === 'W') {
                a.w++; a.b++; cb.b++; cb.out = true;
                updateBowlStats(match.bowler, 0, 1, true);
                a.h.push({ v: 'W', class: 'ball-wicket' });
                if(a.w >= match.wickets) nextInnings();
                else { if(match.striker === 1
